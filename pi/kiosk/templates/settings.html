<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=800,initial-scale=1,user-scalable=no">
<title>Installningar</title>
<style>
  :root {
    --bg: #1b1b2e;
    --card: #2a2a44;
    --accent: #ff66cc;
    --accent-strong: #ff00ff;
    --text: #ffffff;
    --muted: #b0b0d0;
    --key: #3a3a55;
    --key-active: #5a5a80;
    --teal: #00d4ff;
  }
  html, body {
    margin: 0; padding: 0;
    width: 800px; height: 480px;
    font-family: -apple-system, "Helvetica Neue", sans-serif;
    background: var(--bg); color: var(--text);
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    touch-action: manipulation;
  }
  body { display: flex; flex-direction: column; }
  header {
    padding: 6px 12px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid #444;
    flex-shrink: 0;
  }
  header h1 { font-size: 18px; margin: 0; color: var(--accent); }
  .topbtn {
    background: var(--card); border: 1px solid #555; color: var(--text);
    padding: 6px 12px; border-radius: 6px; font-size: 15px;
  }
  main {
    flex: 1; overflow: hidden;
    display: flex; flex-direction: column;
    padding: 8px;
    gap: 8px;
    min-height: 0;
  }
  section {
    background: var(--card); border-radius: 8px; padding: 10px;
  }
  section h2 { margin: 0 0 6px 0; font-size: 14px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .row { display: flex; align-items: center; gap: 8px; }
  #phone-input {
    flex: 1; padding: 8px 10px; font-size: 22px;
    border-radius: 6px; border: 1px solid #555;
    background: #11111c; color: white;
    letter-spacing: 1px; outline: none;
  }
  .btn-primary {
    background: var(--accent-strong); color: white;
    padding: 10px 14px; font-size: 16px;
    border: 0; border-radius: 6px; font-weight: bold;
  }
  .link-row { display: flex; gap: 8px; }
  .link-row a {
    flex: 1; text-align: center;
    background: var(--key); color: white; text-decoration: none;
    padding: 10px; border-radius: 6px; font-size: 16px;
    border: 1px solid #555;
  }
  .link-row .wifi-link { background: var(--teal); color: #11111c; font-weight: bold; }

  /* Number keyboard */
  #kb { display: flex; flex-direction: column; gap: 4px; margin-top: auto; padding: 0 30px; }
  .kb-row { display: flex; gap: 6px; justify-content: center; }
  .kb-row button {
    flex: 1; height: 50px; font-size: 24px;
    background: var(--key); color: var(--text);
    border: 1px solid #555; border-radius: 6px;
  }
  .kb-row button:active { background: var(--key-active); }

  #toast {
    display: none;
    position: fixed; left: 50%; bottom: 14px;
    transform: translateX(-50%);
    padding: 8px 14px; border-radius: 8px;
    background: var(--card);
    font-size: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }
  #toast.show { display: block; }

  /* Mode-knappar */
  .mode-btn {
    padding: 12px 16px; font-size: 16px;
    background: var(--card); color: var(--text);
    border: 2px solid #555; border-radius: 6px;
    font-weight: bold;
  }
  .mode-btn.active {
    background: var(--accent-strong);
    border-color: white;
    color: white;
  }

  /* PIR toggle */
  .switch-row {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px;
  }
  .switch-label { font-size: 18px; }
  .switch {
    position: relative; display: inline-block;
    width: 72px; height: 38px;
  }
  /* Checkboxen tacker hela switch-omradet osynligt sa tap traffar den
     direkt — width:0/height:0 gjorde att taps gick till slider istallet. */
  .switch input {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    margin: 0;
    opacity: 0;
    cursor: pointer;
    z-index: 2;
  }
  .slider {
    position: absolute; inset: 0;
    background: #555; border-radius: 38px;
    transition: 0.15s;
    pointer-events: none;
  }
  .slider::before {
    content: ""; position: absolute;
    height: 30px; width: 30px;
    left: 4px; bottom: 4px;
    background: white; border-radius: 50%;
    transition: 0.15s;
  }
  input:checked + .slider { background: var(--accent-strong); }
  input:checked + .slider::before { transform: translateX(34px); }
</style>
</head>
<body>
<header>
  <h1>⚙️ Inställningar</h1>
  <a class="topbtn" href="/">↩ Tillbaka</a>
</header>
<main>
  <section>
    <h2>Telefonnummer att ringa</h2>
    <div class="row">
      <input id="phone-input" type="tel" value="{{ current_phone }}" inputmode="tel" autocomplete="off">
      <button id="save-btn" class="btn-primary">Spara</button>
    </div>
  </section>

  <section>
    <div class="switch-row">
      <span class="switch-label">💬 Läge</span>
      <div style="display:flex;gap:6px">
        <button id="mode-voice-btn" class="mode-btn" data-mode="voice">📞 Samtal</button>
        <button id="mode-sms-btn" class="mode-btn" data-mode="sms">💬 SMS</button>
      </div>
    </div>
  </section>

  <section>
    <div class="switch-row" id="pir-row">
      <span class="switch-label">📡 PIR-sensor (automatisk trigger)</span>
      <button id="pir-btn" class="topbtn" style="min-width: 120px; padding: 12px 18px; font-size: 18px;">
        {% if pir_enabled %}PÅ{% else %}AV{% endif %}
      </button>
    </div>
  </section>

  <section class="link-row">
    <a class="wifi-link" href="/wifi-setup">📶 Byt WiFi-nätverk</a>
  </section>

  <section class="link-row">
    <button id="reboot-btn" class="topbtn" style="flex:1; padding: 12px; font-size: 15px;">🔄 Starta om</button>
    <button id="poweroff-btn" style="flex:1; padding: 12px; font-size: 15px; background:#c00; color:white; border:0; border-radius:6px; font-weight:bold;">⏻ Stäng av</button>
  </section>

  <div id="kb"></div>
</main>
<div id="toast"></div>

<script>
const phoneInput = document.getElementById('phone-input');
const toast = document.getElementById('toast');
function showToast(msg, ms=2500) {
  toast.textContent = msg;
  toast.classList.add('show');
  if (ms) setTimeout(() => toast.classList.remove('show'), ms);
}

const ROWS = [
  ['1','2','3'],
  ['4','5','6'],
  ['7','8','9'],
  ['+','0','⌫'],
];
const kb = document.getElementById('kb');
for (const row of ROWS) {
  const div = document.createElement('div');
  div.className = 'kb-row';
  for (const k of row) {
    const b = document.createElement('button');
    b.textContent = k;
    b.addEventListener('click', () => {
      if (k === '⌫') phoneInput.value = phoneInput.value.slice(0, -1);
      else phoneInput.value += k;
    });
    div.appendChild(b);
  }
  kb.appendChild(div);
}

// Mode-val (voice / sms)
let currentMode = "{{ mode }}";
function updateModeBtns() {
  document.querySelectorAll('.mode-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.mode === currentMode);
  });
}
updateModeBtns();
document.querySelectorAll('.mode-btn').forEach(b => {
  b.addEventListener('click', async () => {
    const target = b.dataset.mode;
    if (target === currentMode) return;
    showToast('Byter läge…', 0);
    try {
      const res = await fetch('/api/mode', {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({mode: target}),
      });
      const data = await res.json();
      if (res.ok && data.mode) {
        currentMode = data.mode;
        updateModeBtns();
        showToast('Läge: ' + (currentMode === 'voice' ? '📞 Samtal' : '💬 SMS'));
      } else {
        showToast('Fel: ' + (data.error || res.status));
      }
    } catch (e) {
      showToast('Fel: ' + e.message);
    }
  });
});

const pirBtn = document.getElementById('pir-btn');
let pirEnabled = pirBtn.textContent.trim() === 'PÅ';
function updatePirBtn() {
  pirBtn.textContent = pirEnabled ? 'PÅ' : 'AV';
  pirBtn.style.background = pirEnabled ? 'var(--accent-strong)' : 'var(--card)';
  pirBtn.style.color = 'white';
  pirBtn.style.fontWeight = 'bold';
}
updatePirBtn();

async function confirmAndPost(actionName, url, label) {
  // Tva-stegs-bekraftelse: knappen byter till "TRYCK IGEN for att <label>"
  const btn = document.getElementById(actionName + '-btn');
  if (!btn.dataset.armed) {
    const orig = btn.textContent;
    btn.dataset.armed = '1';
    btn.dataset.orig = orig;
    btn.textContent = 'Tryck igen för att ' + label;
    btn.style.background = '#ff6600';
    btn.style.color = 'white';
    setTimeout(() => {
      if (btn.dataset.armed) {
        btn.textContent = btn.dataset.orig;
        btn.dataset.armed = '';
        btn.style.background = '';
        btn.style.color = '';
      }
    }, 5000);
    return;
  }
  btn.dataset.armed = '';
  showToast(label + '…', 0);
  try {
    await fetch(url, {method: 'POST'});
  } catch (e) {}
}

document.getElementById('reboot-btn').addEventListener('click', () => {
  confirmAndPost('reboot', '/api/reboot', 'starta om');
});
document.getElementById('poweroff-btn').addEventListener('click', () => {
  confirmAndPost('poweroff', '/api/poweroff', 'stänga av');
});

pirBtn.addEventListener('click', async () => {
  const target = !pirEnabled;
  showToast(target ? 'Slår på PIR…' : 'Stänger av PIR…', 0);
  try {
    const res = await fetch('/api/pir', {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({enabled: target}),
    });
    const data = await res.json();
    if (res.ok) {
      pirEnabled = !!data.enabled;
      updatePirBtn();
      showToast(pirEnabled ? '📡 PIR påslagen' : '📡 PIR avstängd');
    } else {
      showToast('Fel: ' + (data.error || res.status));
    }
  } catch (err) {
    showToast('Fel: ' + err.message);
  }
});

document.getElementById('save-btn').addEventListener('click', async () => {
  const phone = phoneInput.value.trim();
  if (!phone) { showToast('Tomt nummer'); return; }
  showToast('Sparar…', 0);
  try {
    const res = await fetch('/api/phone', {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({phone}),
    });
    const data = await res.json();
    if (res.ok && data.ok) {
      phoneInput.value = data.phone;
      showToast('Sparat: ' + data.phone);
    } else {
      showToast('Fel: ' + (data.error || res.status));
    }
  } catch (e) {
    showToast('Fel: ' + e.message);
  }
});
</script>
</body>
</html>
