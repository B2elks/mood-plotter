<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=800,initial-scale=1,user-scalable=no">
<title>Installningar</title>
<style>
  :root {
    --bg: #1b1b2e;
    --card: #2a2a44;
    --accent: #ff66cc;
    --accent-strong: #ff00ff;
    --text: #ffffff;
    --muted: #b0b0d0;
    --key: #3a3a55;
    --key-active: #5a5a80;
    --teal: #00d4ff;
  }
  html, body {
    margin: 0; padding: 0;
    width: 800px; height: 480px;
    font-family: -apple-system, "Helvetica Neue", sans-serif;
    background: var(--bg); color: var(--text);
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    touch-action: manipulation;
  }
  body { display: flex; flex-direction: column; }
  header {
    padding: 6px 12px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid #444;
    flex-shrink: 0;
  }
  header h1 { font-size: 18px; margin: 0; color: var(--accent); }
  .topbtn {
    background: var(--card); border: 1px solid #555; color: var(--text);
    padding: 6px 12px; border-radius: 6px; font-size: 15px;
  }
  main {
    flex: 1; overflow: hidden;
    display: flex; flex-direction: column;
    padding: 8px;
    gap: 8px;
    min-height: 0;
  }
  section {
    background: var(--card); border-radius: 8px; padding: 10px;
  }
  section h2 { margin: 0 0 6px 0; font-size: 14px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .row { display: flex; align-items: center; gap: 8px; }
  #phone-input {
    flex: 1; padding: 8px 10px; font-size: 22px;
    border-radius: 6px; border: 1px solid #555;
    background: #11111c; color: white;
    letter-spacing: 1px; outline: none;
  }
  .btn-primary {
    background: var(--accent-strong); color: white;
    padding: 10px 14px; font-size: 16px;
    border: 0; border-radius: 6px; font-weight: bold;
  }
  .link-row { display: flex; gap: 8px; }
  .link-row a {
    flex: 1; text-align: center;
    background: var(--key); color: white; text-decoration: none;
    padding: 10px; border-radius: 6px; font-size: 16px;
    border: 1px solid #555;
  }
  .link-row .wifi-link { background: var(--teal); color: #11111c; font-weight: bold; }

  /* Number keyboard */
  #kb { display: flex; flex-direction: column; gap: 4px; margin-top: auto; padding: 0 30px; }
  .kb-row { display: flex; gap: 6px; justify-content: center; }
  .kb-row button {
    flex: 1; height: 50px; font-size: 24px;
    background: var(--key); color: var(--text);
    border: 1px solid #555; border-radius: 6px;
  }
  .kb-row button:active { background: var(--key-active); }

  #toast {
    display: none;
    position: fixed; left: 50%; bottom: 14px;
    transform: translateX(-50%);
    padding: 8px 14px; border-radius: 8px;
    background: var(--card);
    font-size: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }
  #toast.show { display: block; }
</style>
</head>
<body>
<header>
  <h1>⚙️ Inställningar</h1>
  <a class="topbtn" href="/">↩ Tillbaka</a>
</header>
<main>
  <section>
    <h2>Telefonnummer att ringa</h2>
    <div class="row">
      <input id="phone-input" type="tel" value="{{ current_phone }}" inputmode="tel" autocomplete="off">
      <button id="save-btn" class="btn-primary">Spara</button>
    </div>
  </section>

  <section class="link-row">
    <a class="wifi-link" href="/wifi-setup">📶 Byt WiFi-nätverk</a>
  </section>

  <div id="kb"></div>
</main>
<div id="toast"></div>

<script>
const phoneInput = document.getElementById('phone-input');
const toast = document.getElementById('toast');
function showToast(msg, ms=2500) {
  toast.textContent = msg;
  toast.classList.add('show');
  if (ms) setTimeout(() => toast.classList.remove('show'), ms);
}

const ROWS = [
  ['1','2','3'],
  ['4','5','6'],
  ['7','8','9'],
  ['+','0','⌫'],
];
const kb = document.getElementById('kb');
for (const row of ROWS) {
  const div = document.createElement('div');
  div.className = 'kb-row';
  for (const k of row) {
    const b = document.createElement('button');
    b.textContent = k;
    b.addEventListener('click', () => {
      if (k === '⌫') phoneInput.value = phoneInput.value.slice(0, -1);
      else phoneInput.value += k;
    });
    div.appendChild(b);
  }
  kb.appendChild(div);
}

document.getElementById('save-btn').addEventListener('click', async () => {
  const phone = phoneInput.value.trim();
  if (!phone) { showToast('Tomt nummer'); return; }
  showToast('Sparar…', 0);
  try {
    const res = await fetch('/api/phone', {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({phone}),
    });
    const data = await res.json();
    if (res.ok && data.ok) {
      phoneInput.value = data.phone;
      showToast('Sparat: ' + data.phone);
    } else {
      showToast('Fel: ' + (data.error || res.status));
    }
  } catch (e) {
    showToast('Fel: ' + e.message);
  }
});
</script>
</body>
</html>
