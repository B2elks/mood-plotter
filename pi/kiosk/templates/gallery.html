<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Stamnings-maskinen</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; }
  iframe { width: 100%; height: 100%; border: 0; display: block; }
  .fab {
    position: absolute;
    width: 64px; height: 64px;
    border-radius: 50%;
    color: white; font-size: 28px; font-weight: bold;
    border: 3px solid #fff;
    display: flex; align-items: center; justify-content: center;
    text-decoration: none;
    box-shadow: 0 2px 8px rgba(0,0,0,0.6);
    -webkit-tap-highlight-color: transparent;
    cursor: pointer; user-select: none;
  }
  #call-btn {
    bottom: 14px; right: 14px;
    background: rgba(255, 0, 100, 0.92);
  }
  #call-btn:active { transform: scale(0.95); }
  #settings-btn {
    top: 8px; right: 8px;
    width: 44px; height: 44px;
    font-size: 22px;
    background: rgba(255, 0, 255, 0.85);
    border-width: 2px;
  }
  #toast {
    display: none;
    position: absolute; left: 50%; bottom: 90px;
    transform: translateX(-50%);
    padding: 10px 18px; border-radius: 8px;
    background: rgba(0,0,0,0.85); color: white;
    font-family: -apple-system, sans-serif; font-size: 15px;
    max-width: 80%;
  }
  #toast.show { display: block; }
</style>
</head>
<body>
<iframe src="{{ gallery_url }}" allow="autoplay"></iframe>
<a id="settings-btn" class="fab" href="/settings">&#9881;</a>
<button id="call-btn" class="fab" title="Ring nu">&#9742;</button>
<div id="toast"></div>

<script>
const toast = document.getElementById('toast');
function showToast(msg, ms=2500) {
  toast.textContent = msg;
  toast.classList.add('show');
  if (ms) setTimeout(() => toast.classList.remove('show'), ms);
}

document.getElementById('call-btn').addEventListener('click', async () => {
  showToast('Ringer...', 0);
  try {
    const res = await fetch('/api/trigger', {method: 'POST'});
    const data = await res.json();
    if (res.ok && data.call_id) {
      showToast('Samtal startat ☎️');
    } else if (data.error === 'cooldown') {
      showToast('Cooldown — vänta lite');
    } else {
      showToast('Fel: ' + (data.error || res.status));
    }
  } catch (e) {
    showToast('Fel: ' + e.message);
  }
});
</script>
</body>
</html>
