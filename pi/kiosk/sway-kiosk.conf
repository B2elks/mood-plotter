# Sway-config for mood-plotter kiosk pa Waveshare 4.3" DSI (800x480).
# Sway stoder hide_cursor som forsta-klass-flagga vilket cage saknar.

output * {
    mode 800x480
    bg #0a0a14 solid_color
}

# Aldrig nagonsin nagon muspekare — det ar en touchskarm.
seat seat0 hide_cursor 0

# Inga keybindings behovs i kiosk, men sway kraver en default mod.
set $mod Mod4

# Stang av allt skarmsparar/idle-beteende
exec swayidle -w timeout 999999 ""

# Starta chromium fullscreen mot lokala Flask-appen.
exec /usr/bin/chromium \
    --kiosk \
    --noerrdialogs \
    --disable-infobars \
    --disable-translate \
    --no-first-run \
    --start-fullscreen \
    --check-for-update-interval=31536000 \
    --overscroll-history-navigation=0 \
    --disable-pinch \
    --disable-features=TranslateUI \
    --hide-scrollbars \
    --autoplay-policy=no-user-gesture-required \
    --ozone-platform=wayland \
    --enable-features=UseOzonePlatform \
    --touch-events=enabled \
    --window-size=800,480 \
    http://127.0.0.1:5000/

# Ingen ram/dekoration
default_border none
default_floating_border none
hide_edge_borders both
