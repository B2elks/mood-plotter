# Sway-config for mood-plotter kiosk pa Waveshare 4.3" DSI (800x480).

output * {
    mode 800x480
    bg #0a0a14 solid_color
}

# Aldrig nagonsin nagon muspekare — det ar en touchskarm.
seat seat0 hide_cursor 0

# Inga keybindings behovs i kiosk, men sway kraver en default mod.
set $mod Mod4

# Stang av idle-beteende (sway 1.10 har ingen explicit idle, men swayidle finns)
exec swayidle -w timeout 999999 ""

# Starta chromium via wrapper-skript — sway-parsern stoder inte
# fler-rads exec med backslash-continuation.
exec /home/pi/mood-plotter/pi/kiosk/start_chromium.sh

default_border none
default_floating_border none
hide_edge_borders both
